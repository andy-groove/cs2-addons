// ---------------- Optimization -------------------------
bot_difficulty                5
custom_bot_difficulty         5
skill                         3
sv_clockcorrection_msecs      0
sv_maxrate                    0
sv_minrate                    80000
sv_clockcorrection_msecs      15

// ---------------- Bots Control --------------------------
alias ba                "bot_add"
alias bat               "bot_add_t"
alias bact              "bot_add_ct"
alias bk                "bot_kick"
alias rg                "mp_restartgame 1"
alias rgf               "bk; rg; say Reset Done"
alias wrme              "mp_warmup_end 1"

alias ndoff             "bot_nades off"
alias ndmo              "bot_nades more"
alias ndno              "bot_nades normal"

alias src               "exec custom/autoexec"
alias pls               "css_plugins list"

// ---------------- Maps -----------------------------------
alias  m_anc            "changelevel de_ancient"
alias  m_anu            "changelevel de_anubis"
alias  m_cache          "changelevel de_cache"
alias  m_dust           "changelevel de_dust2"
alias  m_inf            "changelevel de_inferno"
alias  m_over           "changelevel de_overpass"
alias  m_mira           "changelevel de_mirage"
alias  m_nuke           "changelevel de_nuke"
alias  m_vert           "changelevel de_vertigo"
alias  m_rush           "map_workshop 3105821815 aim_rush"
alias  m_aim            "map_workshop 3083320026 fast"

